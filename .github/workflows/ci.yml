name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  PYTHON_VERSION: '3.9'
  DOCKER_COMPOSE_VERSION: 'v2.24.5'

jobs:
  test:
    name: Test with Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]

    - name: Lint with flake8
      run: |
        pip install flake8
        flake8 app setup.py --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 app setup.py --count --max-complexity=10 --max-line-length=88 --statistics

    - name: Check formatting with black
      run: |
        pip install black
        black --check --diff --workers 1 app setup.py

    - name: Run tests with pytest
      run: |
        pip install pytest pytest-cov
        mkdir -p .ci-tests
        cat > .ci-tests/test_app_import.py <<'PY'
        def test_app_module_imports() -> None:
            import app

            assert app.app is not None
        PY
        pytest .ci-tests --cov=app --cov-report=xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        file: ./coverage.xml
        fail_ci_if_error: false

  docker:
    name: Build and Test with Docker
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v4

    - name: Detect Docker artifacts
      id: docker-artifacts
      run: |
        if [ -f Dockerfile ]; then
          echo "has_dockerfile=true" >> "$GITHUB_OUTPUT"
        else
          echo "has_dockerfile=false" >> "$GITHUB_OUTPUT"
          echo "No Dockerfile found; skipping Docker image build."
        fi

        if [ -f docker-compose.test.yml ]; then
          echo "has_compose_test=true" >> "$GITHUB_OUTPUT"
        else
          echo "has_compose_test=false" >> "$GITHUB_OUTPUT"
          echo "No docker-compose.test.yml found; skipping compose test."
        fi

    - name: Set up Docker Buildx
      if: steps.docker-artifacts.outputs.has_dockerfile == 'true'
      uses: docker/setup-buildx-action@v3

    - name: Cache Docker layers
      if: steps.docker-artifacts.outputs.has_dockerfile == 'true'
      uses: actions/cache@v4
      with:
        path: /tmp/.buildx-cache
        key: ${{ runner.os }}-buildx-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-buildx-

    - name: Login to Docker Hub
      if: |
        steps.docker-artifacts.outputs.has_dockerfile == 'true' &&
        github.event_name != 'pull_request' &&
        secrets.DOCKERHUB_USERNAME != '' &&
        secrets.DOCKERHUB_TOKEN != ''
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build Docker image
      if: steps.docker-artifacts.outputs.has_dockerfile == 'true'
      uses: docker/build-push-action@v5
      with:
        context: .
        push: ${{ github.event_name != 'pull_request' }}
        tags: langgraph-mcp:ci
        cache-from: type=local,src=/tmp/.buildx-cache
        cache-to: type=local,dest=/tmp/.buildx-cache-new

    - name: Move cache
      if: steps.docker-artifacts.outputs.has_dockerfile == 'true'
      run: |
        rm -rf /tmp/.buildx-cache
        mv /tmp/.buildx-cache-new /tmp/.buildx-cache

    - name: Run tests in Docker
      if: steps.docker-artifacts.outputs.has_compose_test == 'true'
      run: |
        docker compose -f docker-compose.test.yml up --build --abort-on-container-exit

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [test, docker]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
    - uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2
      with:
        project_id: ${{ secrets.GCP_PROJECT_ID }}

    - name: Deploy to Google Cloud Run
      run: |
        gcloud run deploy langgraph-mcp \
          --image ${{ secrets.DOCKERHUB_USERNAME }}/langgraph-mcp:latest \
          --platform managed \
          --region ${{ secrets.GCP_REGION }} \
          --allow-unauthenticated
      env:
        CLOUDSDK_CORE_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
