name: 🤖 Full Auto Colab Pipeline (100% Automated)

on:
  push:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      force_colab_restart:
        description: 'Force Colab restart'
        required: false
        default: 'false'
  repository_dispatch:
    types: [colab-ready]

env:
  PYTHON_VERSION: '3.11'

jobs:
  # ============================================================
  # JOB 1: Automated Colab Orchestration
  # ============================================================
  orchestrate-colab:
    name: 🤖 Orchestrate Colab (Automated)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install requests

      - name: 🤖 Run Colab Automation Agent
        id: agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COLAB_NOTEBOOK_ID: ${{ secrets.COLAB_NOTEBOOK_ID }}
          COMFYUI_URL_GIST_ID: ${{ secrets.COMFYUI_URL_GIST_ID }}
          COLAB_TRIGGER_WEBHOOK: ${{ secrets.COLAB_TRIGGER_WEBHOOK }}
          COMFYUI_FALLBACK_URL: ${{ secrets.COMFYUI_FALLBACK_URL }}
          DISPATCH_COMFYUI_URL: ${{ github.event.client_payload.comfyui_url }}
        run: |
          # Se disparado via repository_dispatch com URL no payload, usar diretamente
          if [ ! -z "$DISPATCH_COMFYUI_URL" ]; then
            echo "🎯 Disparado via repository_dispatch!"
            printf '%s' "$DISPATCH_COMFYUI_URL" > comfyui_url.txt
            echo "status=ready" >> $GITHUB_OUTPUT
            echo "✅ URL do Colab configurada diretamente!"
          else
            echo "🤖 Iniciando Agente de Automação do Colab..."
            python .github/scripts/colab_automation_agent.py
            echo "✅ Agente executado com sucesso!"
          fi

      - name: Verify URL captured
        run: |
          if [ ! -s comfyui_url.txt ]; then
            echo "❌ URL não foi capturada pelo agente"
            exit 1
          fi
          
          echo "✅ URL válida capturada!"

      - name: Upload URL artifact
        uses: actions/upload-artifact@v4
        with:
          name: comfyui-url
          path: comfyui_url.txt
          retention-days: 1

  # ============================================================
  # JOB 2: Update Configuration (Automated)
  # ============================================================
  update-config:
    name: ⚙️ Update Configuration
    runs-on: ubuntu-latest
    needs: orchestrate-colab
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download ComfyUI URL artifact
        uses: actions/download-artifact@v4
        with:
          name: comfyui-url

      - name: Update .env with Colab URL
        run: |
          URL="$(cat comfyui_url.txt)"
          echo "📝 Atualizando configurações com URL capturada"
          
          # Criar/atualizar .env
          echo "COMFYUI_URL=$URL" > .env.auto
          echo "COMFYUI_SOURCE=colab_automated" >> .env.auto
          echo "UPDATED_AT=$(date)" >> .env.auto
          
          echo "✅ Configurações atualizadas!"

  # ============================================================
  # JOB 3: Run Integration Tests (Automated)
  # ============================================================
  test-integration:
    name: 🧪 Run Integration Tests
    runs-on: ubuntu-latest
    needs: orchestrate-colab
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download ComfyUI URL artifact
        uses: actions/download-artifact@v4
        with:
          name: comfyui-url

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install pytest requests

      - name: Test ComfyUI Integration
        run: |
          COMFYUI_URL="$(cat comfyui_url.txt)"
          export COMFYUI_URL
          echo "🧪 Testando integração com ComfyUI..."
          echo "URL capturada para teste"
          
          # Criar teste
          cat > test_comfyui_auto.py << 'EOF'
          import os
          import requests

          def test_comfyui_available():
              url = os.getenv('COMFYUI_URL')
              assert url, "COMFYUI_URL not set"
              
              print(f"🔍 Testando URL: {url}")
              response = requests.get(url, timeout=10)
              assert response.status_code == 200, f"ComfyUI not accessible: {response.status_code}"
              print(f"✅ ComfyUI is accessible at {url}")

          if __name__ == "__main__":
              test_comfyui_available()
          EOF
          
          python test_comfyui_auto.py

  # ============================================================
  # JOB 4: Generate AI Content (Automated)
  # ============================================================
  generate-content:
    name: 🎬 Generate AI Content
    runs-on: ubuntu-latest
    needs: [orchestrate-colab, test-integration]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download ComfyUI URL artifact
        uses: actions/download-artifact@v4
        with:
          name: comfyui-url

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install requests
          pip install -r requirements.txt || echo "requirements.txt not found"
          pip install -r open3d_implementation/orchestration/requirements_dagster.txt || echo "requirements_dagster.txt not found"

      - name: Export ComfyUI URL
        run: |
          echo "COMFYUI_URL=$(cat comfyui_url.txt)" >> "$GITHUB_ENV"
          echo "✅ ComfyUI URL carregada"

      - name: 🎬 Run AI Film Pipeline
        env:
          STORY_INPUT: ${{ github.event.client_payload.story }}
          # LLM APIs (Gemini como principal, OpenAI como fallback)
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # Outras APIs
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          STABILITY_API_KEY: ${{ secrets.STABILITY_API_KEY }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
        run: |
          echo "🎬 Iniciando pipeline de geração de conteúdo..."
          echo "URL do ComfyUI carregada"
          echo "🤖 LLM: Gemini 2.0 Flash (Principal)"
          
          # Criar diretório output se não existir
          mkdir -p output
          
          # Salvar história do payload em arquivo (preservando quebras de linha)
          if [ ! -z "$STORY_INPUT" ]; then
            echo "📝 História recebida do Colab"
            # Usar cat com heredoc para preservar quebras de linha
            cat > output/story_latest.txt << 'STORY_EOF'
          ${{ github.event.client_payload.story }}
          STORY_EOF
            # Contar caracteres
            STORY_SIZE=$(wc -c < output/story_latest.txt)
            echo "✅ História salva: $STORY_SIZE caracteres"
          else
            echo "⚠️ Nenhuma história no payload, verificando arquivo..."
            if [ ! -f output/story_latest.txt ]; then
              echo "❌ Arquivo de história não encontrado!"
              echo "💡 Criando história padrão..."
              echo "Uma jornada épica através de um mundo cyberpunk futurista" > output/story_latest.txt
            fi
          fi
          
          # Instalar dependências Python e FFmpeg
          echo "📦 Instalando dependências Python..."
          pip install langchain langchain-openai langchain-google-genai langgraph dagster python-dotenv requests pillow
          
          echo "🎬 Instalando FFmpeg..."
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          
          # Verificar ambiente
          python .github/scripts/check_env.py
          python .github/scripts/check_deps.py
          python .github/scripts/test_env.py
          python .github/scripts/diagnose_env.py
          
          # Executar pipeline real
          python .github/scripts/run_ai_pipeline.py
          
          echo "✅ Pipeline de conteúdo executado!"

  # ============================================================
  # JOB 5: Deploy to Kubernetes (Automated - Only on main)
  # ============================================================
  deploy-kubernetes:
    name: 🚢 Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: [orchestrate-colab, generate-content]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download ComfyUI URL artifact
        uses: actions/download-artifact@v4
        with:
          name: comfyui-url

      - name: Update Kubernetes Secret
        run: |
          URL="$(cat comfyui_url.txt)"
          echo "🔐 Atualizando secret do Kubernetes..."
          echo "URL capturada para secret"
          
          # Aqui você configuraria kubectl e atualizaria o secret
          # kubectl create secret generic comfyui-url --from-literal=url="$URL" --dry-run=client -o yaml | kubectl apply -f -
          
          echo "✅ Secret atualizado (simulado)"

  # ============================================================
  # JOB 6: Notification (Automated)
  # ============================================================
  notify:
    name: 📢 Send Notification
    runs-on: ubuntu-latest
    needs: [orchestrate-colab, generate-content]
    if: always()
    steps:
      - name: Send notification
        run: |
          STATUS="${{ needs.generate-content.result }}"
          
          echo "📢 Enviando notificação..."
          echo "Status: $STATUS"
          
          # Aqui você pode enviar para Slack, Discord, etc
          # curl -X POST $WEBHOOK_URL -d "Pipeline status: $STATUS"
          
          echo "✅ Notificação enviada!"

  # ============================================================
  # JOB 7: Cleanup (Automated)
  # ============================================================
  cleanup:
    name: 🧹 Cleanup Resources
    runs-on: ubuntu-latest
    needs: [orchestrate-colab, generate-content, deploy-kubernetes]
    if: always()
    steps:
      - name: Cleanup temporary resources
        run: |
          echo "🧹 Limpando recursos temporários..."
          
          # Aqui você pode limpar recursos temporários
          # Exemplo: parar Colab se necessário, limpar caches, etc
          
          echo "✅ Limpeza concluída!"
