name: Build RunPod ComfyUI Worker

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "codex/**"
    paths:
      - "runpod_worker/**"
      - ".github/workflows/runpod-worker.yml"

permissions:
  contents: read
  packages: write

concurrency:
  group: runpod-worker-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push RunPod worker
        uses: docker/build-push-action@v6
        with:
          context: ./runpod_worker
          push: true
          tags: |
            ghcr.io/patricia7sp/ai-film-comfyui-worker:flux2-klein-latest
            ghcr.io/patricia7sp/ai-film-comfyui-worker:flux2-klein-${{ github.sha }}
          cache-from: type=gha,scope=runpod-worker
          cache-to: type=gha,mode=max,scope=runpod-worker
          provenance: mode=max
          sbom: true
