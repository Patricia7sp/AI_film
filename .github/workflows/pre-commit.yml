name: Pre-commit Checks

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop, 'feature/**']

jobs:
  pre-commit:
    name: Pre-commit Hooks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            CHANGED_FILES="$(git diff --name-only --diff-filter=ACMR "origin/${{ github.base_ref }}"...HEAD)"
            if [ -z "$CHANGED_FILES" ]; then
              echo "No changed files to validate."
              exit 0
            fi
            echo "$CHANGED_FILES" > /tmp/changed-files.txt
            xargs pre-commit run trailing-whitespace --files < /tmp/changed-files.txt
            xargs pre-commit run end-of-file-fixer --files < /tmp/changed-files.txt
            xargs pre-commit run check-added-large-files --files < /tmp/changed-files.txt
            xargs pre-commit run check-merge-conflict --files < /tmp/changed-files.txt
            xargs pre-commit run check-yaml --files < /tmp/changed-files.txt
            xargs pre-commit run check-json --files < /tmp/changed-files.txt
            xargs pre-commit run check-toml --files < /tmp/changed-files.txt
          else
            pre-commit run --all-files
          fi
