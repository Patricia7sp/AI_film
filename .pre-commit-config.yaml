repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        files: ^(\.github/workflows/(ci|ci-cd-pipeline|full-auto-deploy)\.yml|\.pre-commit-config\.yaml|app/.*\.py|setup\.py|open3d_implementation/.*\.py|pyproject\.toml)$
      - id: end-of-file-fixer
        files: ^(\.github/workflows/(ci|ci-cd-pipeline|full-auto-deploy)\.yml|\.pre-commit-config\.yaml|app/.*\.py|setup\.py|open3d_implementation/.*\.py|pyproject\.toml)$
      - id: check-yaml
        args: [--allow-multiple-documents]
        files: ^(\.github/workflows/.*\.ya?ml|\.pre-commit-config\.yaml)$
      - id: check-toml
        files: ^pyproject\.toml$
      - id: check-merge-conflict

  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        language_version: python3
        args: [--line-length=88]
        files: ^(app/.*\.py|setup\.py|open3d_implementation/.*\.py)$

  - repo: https://github.com/pycqa/flake8
    rev: 7.1.1
    hooks:
      - id: flake8
        language_version: python3
        args: [--max-complexity=10, --max-line-length=88]
        files: ^(app/.*\.py|setup\.py)$
